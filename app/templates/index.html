<!DOCTYPE html>
<html>
<head>
    <title>AI Image Generator</title>
</head>
<body>

<h2>Generate AI Image</h2>

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="prompt"
        placeholder="Enter image prompt"
        required
    >

    <button type="submit">
        Generate
    </button>
</form>

<hr>

{% for image in images %}

<p>{{ image.prompt }}</p>

<img
    src="{{ image.image.url }}"
    width="400"
>

<hr>

{% endfor %}

</body>
</html>
